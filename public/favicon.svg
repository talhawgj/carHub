<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#4F46E5"/>
  <g transform="translate(20, 25)">
    <!-- Car body -->
    <rect x="5" y="15" width="50" height="20" rx="4" fill="#FFFFFF"/>
    <!-- Car roof -->
    <polygon points="15,15 35,5 50,15" fill="#FFFFFF"/>
    <!-- Left wheel -->
    <circle cx="15" cy="40" r="6" fill="#312E81"/>
    <circle cx="15" cy="40" r="4" fill="#4F46E5"/>
    <!-- Right wheel -->
    <circle cx="50" cy="40" r="6" fill="#312E81"/>
    <circle cx="50" cy="40" r="4" fill="#4F46E5"/>
    <!-- Window -->
    <rect x="22" y="10" width="8" height="8" fill="#E0E7FF" opacity="0.7"/>
  </g>
</svg>