<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#4F46E5" stroke="#312E81" stroke-width="4"/>
  
  <!-- Car body -->
  <g transform="translate(50, 70)">
    <!-- Main car body -->
    <rect x="10" y="35" width="80" height="35" fill="#FFFFFF" rx="8"/>
    
    <!-- Car roof -->
    <path d="M 20 35 L 35 15 L 65 15 L 80 35" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round"/>
    
    <!-- Front windshield -->
    <path d="M 35 20 L 50 35 L 50 35 L 35 35" fill="#E0E7FF" opacity="0.8"/>
    
    <!-- Back windshield -->
    <path d="M 65 20 L 65 35 L 80 35 L 75 25" fill="#E0E7FF" opacity="0.8"/>
    
    <!-- Left wheel -->
    <circle cx="25" cy="75" r="12" fill="#312E81" stroke="#4F46E5" stroke-width="2"/>
    <circle cx="25" cy="75" r="8" fill="#4F46E5"/>
    <circle cx="25" cy="75" r="4" fill="#1E1B4B"/>
    
    <!-- Right wheel -->
    <circle cx="75" cy="75" r="12" fill="#312E81" stroke="#4F46E5" stroke-width="2"/>
    <circle cx="75" cy="75" r="8" fill="#4F46E5"/>
    <circle cx="75" cy="75" r="4" fill="#1E1B4B"/>
    
    <!-- Car details - door line -->
    <line x1="50" y1="40" x2="50" y2="68" stroke="#4F46E5" stroke-width="1"/>
    
    <!-- Headlights -->
    <circle cx="12" cy="50" r="3" fill="#FCD34D"/>
    <circle cx="12" cy="58" r="3" fill="#FCD34D"/>
  </g>
</svg>